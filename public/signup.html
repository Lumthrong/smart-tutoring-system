<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Smart Tutor</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar" id="sidebar">
  <h2>Smart Tutor</h2>
  <a href="index.html">Home</a>
  <a href="dashboard.html">Dashboard</a>
</div>

<div class="overlay" id="overlay"></div>

<header>
  <button class="menu-btn" id="menuBtn">☰</button>
  <h1>Smart Tutoring System</h1>
</header>

<section class="auth-section">
  <div class="auth-box">
  <h2>Create Account</h2>

  <input type="email" id="email" placeholder="Email" required>

  <input type="password" id="password" placeholder="Password (min 6, alphanumeric)" required>

<p id="passwordStrength" style="
  font-size:14px;
  margin-top:4px;
  margin-bottom:10px;
  color:#888;
"></p>

<input type="password" id="confirmPassword" placeholder="Confirm Password" required>

  <label style="display:block; margin-top:10px;">
    <input type="checkbox" id="teacherRequest">
    Request Teacher Access
  </label>

  <button onclick="sendOTP()" class="btnlogin">
    Send OTP
  </button>

  <input type="text" id="otpInput" placeholder="Enter OTP">
<div id="formMessage" class="form-message"></div>
  <button onclick="verifyOTP()" class="btnlogin">
    Verify OTP & Create Account
  </button>

  <p>Already have an account?
    <a href="login.html">Login</a>
  </p>
</div>
</section>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/script.js"></script>
</body>
</html>
