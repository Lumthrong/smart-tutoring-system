<!DOCTYPE html>

<head>

    <!-- USER MINI HEADER -->

      </div>
      <div class="profile-info">
        <p id="profileName">Guest</p>
        <small id="profileEmail"></small>
      </div>
    </div>

    <a href="index.html">Home</a>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-wrapper">
      <div class="profile-toggle" id="profileToggle">
        Profile ▾
      </div>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="dashboard.html" id="dashboardLink">Dashboard</a>
        <a href="accsettings.html">Profile Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </div>
    <div class="book-wrapper">
      <div class="book-toggle" id="bookToggle">
        Books ▾
      </div>
      <div class="book-dropdown" id="bookDropdown">
        <a href="/department.html?dept=COMPUTER SCIENCE">
          Computer Science
        </a>
        <a href="/department.html?dept=MECHANICAL">
          Mechanical Engineering
        </a>
        <a href="/department.html?dept=CIVIL">
          Civil Engineering
        </a>
        <a href="/department.html?dept=ELECTRICAL">
          Electrical Engineering
        </a>
        <a href="/department.html?dept=GENERAL KNOWLEDGE">
          General Knowledge
        </a>
        <a href="/department.html?dept=OTHERS">
          Others
        </a>
      </div>
    </div>
    <div class="footer">
      <a href="about.html">About</a>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>

<header>
  <button class="menu-btn" id="menuBtn">☰</button>
  <h1>Your dashboard</h1>

 <div class="notify" id="notifyBell">
    <i class="fa-solid fa-bell"></i>
  <span id="notifyCount">0</span>
  <div id="notificationPanel" class="notify-panel">
    <div class="notify-header">
      Notifications
    </div>

    <div id="notificationList"></div>
  </div>
</div>
</header>
<section class="body-st">
<h2>Create Quiz</h2>
<div id="msgBox" class="msg"></div>
<input id="quizTitle" placeholder="Quiz title">

<input id="timeLimit" type="number" placeholder="Minutes">

<div id="questions"></div>

<button onclick="addQuestion()" class="quiz-btn">Add Question</button>
<button onclick="saveQuiz()" class="quiz-btn">Save Quiz</button>
</section>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/script.js"></script>
<script type="module" src="js/createQuiz.js"></script>
<script type="module" src="js/notification.js"></script>
