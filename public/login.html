<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Smart Tutor</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>

  <div class="sidebar" id="sidebar">

     <!-- USER MINI HEADER -->
    <div class="profile-mini">
      <div class="avatar-circle">
        <img id="miniProfileImg" src="" alt="Avatar">
        <span id="avatarCircle">U</span>
      </div>
      <div class="profile-info">
        <p id="profileName">Guest</p>
        <small id="profileEmail"></small>
      </div>
    </div>
    <a href="index.html"><span class="material-symbols-outlined">home
      </span> Home</a>
    <a href="dashboard.html"><span class="material-symbols-outlined">
        dashboard
      </span> Dashboard</a>
  </div>

  <div class="overlay" id="overlay"></div>

  <header>
    <button class="menu-btn" id="menuBtn"><span class="material-symbols-outlined">
        menu
      </span></button>
    <h1>Smart Tutoring System</h1>
  </header>

  <section class="auth-section">
    <div class="auth-box">
      <h2>Login</h2>
<select id="loginRole">
  <option value="student">Student</option>
  <option value="teacher">Teacher</option>
</select>

<input type="text" id="rollNo" placeholder="Roll Number">

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">
      <div id="formMessage" class="form-message"></div>
      <button id="loginBtn" onclick="login()" class="btnlogin">Login</button>
      <p>Don't have an account? <a href="signup.html">Signup</a></p>
    </div>
  </section>
  
  <script>
document.getElementById("loginRole").addEventListener("change", function() {
  document.getElementById("rollNo").style.display =
    this.value === "student" ? "block" : "none";
});
</script>

  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/script.js"></script>
</body>

</html>
