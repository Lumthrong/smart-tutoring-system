<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tutor</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/createQuiz.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>

<body>
  <div class="sidebar" id="sidebar">

    <!-- USER MINI HEADER -->
    <div class="profile-mini">
      <div class="avatar-circle">
        <img id="miniProfileImg" src="" alt="Avatar">
        <span id="avatarCircle">U</span>
      </div>
      <div class="profile-info">
        <p id="profileName">Guest</p>
        <small id="profileEmail"></small>
      </div>
    </div>

    <a href="index.html"><span class="material-symbols-outlined">home
      </span> Home</a>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-wrapper">
      <div class="profile-toggle" id="profileToggle"><span class="material-symbols-outlined">
          account_circle
        </span>
        Profile ▾
      </div>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="dashboard.html" id="dashboardLink"><span class="material-symbols-outlined">
            dashboard
          </span> Dashboard</a>
        <a href="/accsettings.html"><span class="material-symbols-outlined">
            settings
          </span> Profile Settings</a>
        <a href="#" id="logoutLink"><span class="material-symbols-outlined">
            logout
          </span> Logout</a>
      </div>
    </div>
    <div class="book-wrapper">

    </div>
    <div class="footer">
      <a href="department.html"><span class="material-symbols-outlined">newsstand</span>Department</a>
      <a href="about.html"><span class="material-symbols-outlined">
          info
        </span> About</a>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>

  <header>
    <button class="menu-btn" id="menuBtn"><span class="material-symbols-outlined">
        menu
      </span></button>
    <h1>Home</h1>

    <div class="notify" id="notifyBell">
      <span class="material-symbols-outlined">
        notifications
      </span>
      <span id="notifyCount">0</span>
      <div id="notificationPanel" class="notify-panel">
        <div class="notify-header">
          Notifications
        </div>

        <div id="notificationList"></div>
      </div>
    </div>
  </header>
  
<section class="body-st">
<h2>Create Quiz</h2>
<div id="msgBox" class="msg"></div>
<input id="quizTitle" placeholder="Quiz title">

<input id="timeLimit" type="number" placeholder="Minutes">

<div id="questions"></div>

<button onclick="addQuestion()" class="quiz-btn">Add Question</button>
<button onclick="saveQuiz()" class="quiz-btn">Save Quiz</button>
</section>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/script.js"></script>
<script type="module" src="js/createQuiz.js"></script>
<script type="module" src="js/notification.js"></script>
</body>
</html>
