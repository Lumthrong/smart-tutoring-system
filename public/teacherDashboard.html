<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Dashboard</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/teacher.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body data-role="teacher">

<div class="sidebar" id="sidebar">

    <!-- USER MINI HEADER -->
    <div class="profile-mini">
      <div class="avatar-circle">
        <img id="miniProfileImg" src="" alt="Avatar">
        <span id="avatarCircle">U</span>
      </div>
      <div class="profile-info">
        <p id="profileName">Guest</p>
        <small id="profileEmail"></small>
      </div>
    </div>

    <a href="index.html">Home</a>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-wrapper">
      <div class="profile-toggle" id="profileToggle">
        Profile ▾
      </div>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="dashboard.html" id="dashboardLink">Dashboard</a>
        <a href="accsettings.html">Profile Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </div>
    <div class="book-wrapper">
      <div class="book-toggle" id="bookToggle">
        Books ▾
      </div>
      <div class="book-dropdown" id="bookDropdown">
        <a href="/department.html?dept=COMPUTER SCIENCE">
          Computer Science
        </a>
        <a href="/department.html?dept=MECHANICAL">
          Mechanical Engineering
        </a>
        <a href="/department.html?dept=CIVIL">
          Civil Engineering
        </a>
        <a href="/department.html?dept=ELECTRICAL">
          Electrical Engineering
        </a>
        <a href="/department.html?dept=GENERAL KNOWLEDGE">
          General Knowledge
        </a>
        <a href="/department.html?dept=OTHERS">
          Others
        </a>
      </div>
    </div>
    <div class="footer">
      <a href="About.html">About</a>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>

<header>
  <button class="menu-btn" id="menuBtn">☰</button>
  <h1>Dashboard (Teacher)</h1>
      <div class="notify" id="notifyBell">
    <i class="fa-solid fa-bell"></i>
  <span id="notifyCount">0</span>
  <div id="notificationPanel" class="notify-panel">
    <div class="notify-header">
      Notifications
    </div>

    <div id="notificationList"></div>
  </div>
</div>
</header>

  <!-- 🔥 Upload Lecture -->
  <div class="card">
    <h3>Upload Lecture</h3>

    <form id="uploadLectureForm" enctype="multipart/form-data">

      <select name="department" id="category" required>

<option value="">Select Category</option>

<option value="Information Technology">Information Technology</option>
<option value="Computer Science">Computer Science</option>
<option value="Science">Science</option>
<option value="Business">Business</option>
<option value="Humanities">Humanities</option>
<option value="Arts">Arts</option>
<option value="Languages">Languages</option>
<option value="Health">Health & Fitness</option>
<option value="Education">Education</option>
<option value="Personal Development">Personal Development</option>
<option value="General Knowledge">General Knowledge</option>
<option value="Others">Others</option>

</select>

      <select name="semester" required>
        <option value="">Select Semester</option>
        <option value="1">Semester 1</option>
        <option value="2">Semester 2</option>
        <option value="3">Semester 3</option>
        <option value="4">Semester 4</option>
        <option value="5">Semester 5</option>
        <option value="6">Semester 6</option>
        <option value="7">Semester 7</option>
        <option value="8">Semester 8</option>
      </select>

      <input type="text" name="course" placeholder="Course Name" required>
       <input type="text" name="tags" id="tags" placeholder="Tags (example: AI, Python, History)">
       <label>Book Cover (Optional)</label>
<input type="file" name="cover" accept="image/*">
      <label>Upload PDF (Required)</label>
      <input type="file" name="pdf" accept="application/pdf" required>

      <label>Upload Video (Optional)</label>
      <input type="file" name="video" accept="video/*">
      <button type="submit" id="uploadBtn" class="upload-btn">
  <span class="btn-text">Upload</span>
  <span class="btn-loader"></span>
</button>
    </form>
  </div>
    <div id="systemMessage"></div>
<div class="card">
  <h3>Quiz Results</h3>
  <div id="quizResults"></div>
</div>
<div class="card">
  <h3>My Quizzes</h3>
  <div id="teacherQuizzes"></div>
</div>
  <!-- 🔥 My Uploads -->
  <div class="card">
    <h3>My Uploaded Lectures</h3>
    <div id="myLectures"></div>
    <div class="chatBox" id="chatBox">

        <div class="chatHeader">
          <span>Course Discussion</span>
          <button class="chatClose" id="chatClose">✕</button>
        </div>

        <div class="chatMessages commentList"></div>

        <div class="chatInput">
          <input class="commentInput" placeholder="write...">
          <button class="sendComment">Send</button>
        </div>

      </div>
  </div>
  

</section>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/teacher.js"></script>
<script type="module" src="js/script.js"></script>
<script type="module" src="js/notification.js"></script>

</body>
</html>
