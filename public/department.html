<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Smart Tutor</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/department.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="sidebar" id="sidebar">

  <!-- USER MINI HEADER -->
  <div class="profile-mini">
    <div class="avatar-circle">
  <img id="miniProfileImg" src="" alt="Avatar">
  <span id="avatarCircle">U</span>
</div>
    <div class="profile-info">
      <p id="profileName">Guest</p>
      <small id="profileEmail"></small>
    </div>
  </div>

  <a href="index.html">Home</a>

  <!-- PROFILE DROPDOWN -->
  <div class="profile-wrapper">
    <div class="profile-toggle" id="profileToggle">
      Profile ▾
    </div>

    <div class="profile-dropdown" id="profileDropdown">
      <a href="dashboard.html" id="dashboardLink">Dashboard</a>
      <a href="accsettings.html">Profile Settings</a>
      <a href="#" id="logoutLink">Logout</a>
    </div>
  </div>

  <a href="login.html" id="loginLink">Login</a>

</div>

<div class="overlay" id="overlay"></div>

<header>
  <button class="menu-btn" id="menuBtn">☰</button>
  <h1>CSE</h1>

   <div class="notify" id="notifyBell">
    <i class="fa-solid fa-bell"></i>
  <span id="notifyCount">0</span>
  <div id="notificationPanel" class="notify-panel">
    <div class="notify-header">
      Notifications
    </div>

    <div id="notificationList"></div>
  </div>
</div>
</header>
<section class="dept-sect">
  <div class="search-box">

  <i class="fa-solid fa-magnifying-glass"></i>

  <input
    type="text"
    id="courseSearch"
    placeholder="Search course..."
    class="course-search"
  />
</div>
<h2 id="deptTitle"></h2>
<div id="deptCourses"></div>
</section>

<script type="module" src="js/department.js"></script>
<script type="module" src="js/script.js"></script>
<script type="module" src="js/auth.js"></script>
<script type="module" src="js/notification.js"></script>
</body>
</html>
