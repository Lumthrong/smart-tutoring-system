<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Smart Tutor</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

  <div class="sidebar" id="sidebar">

    <!-- USER MINI HEADER -->
    <div class="profile-mini">
      <div class="avatar-circle">
        <img id="miniProfileImg" src="" alt="Avatar">
        <span id="avatarCircle">U</span>
      </div>
      <div class="profile-info">
        <p id="profileName">Guest</p>
        <small id="profileEmail"></small>
      </div>
    </div>

    <a href="index.html"><span class="material-symbols-outlined">home
      </span> Home</a>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-wrapper">
      <div class="profile-toggle" id="profileToggle"><span class="material-symbols-outlined">
          account_circle
        </span>
        Profile ▾
      </div>
      <div class="profile-dropdown" id="profileDropdown">
        <a href="dashboard.html" id="dashboardLink"><span class="material-symbols-outlined">
            dashboard
          </span> Dashboard</a>
        <a href="/accsettings.html"><span class="material-symbols-outlined">
            settings
          </span> Profile Settings</a>
        <a href="#" id="logoutLink"><span class="material-symbols-outlined">
            logout
          </span> Logout</a>
      </div>
    </div>
    <div class="book-wrapper">

    </div>
    <div class="footer">
      <a href="department.html"><span class="material-symbols-outlined">newsstand</span>Department</a>
      <a href="about.html"><span class="material-symbols-outlined">
          info
        </span> About</a>
    </div>
  </div>
  <div class="overlay" id="overlay"></div>

  <header>
    <button class="menu-btn" id="menuBtn"><span class="material-symbols-outlined">
        menu
      </span></button>
    <h1>Home</h1>

    <div class="notify" id="notifyBell">
      <span class="material-symbols-outlined">
        notifications
      </span>
      <span id="notifyCount">0</span>
      <div id="notificationPanel" class="notify-panel">
        <div class="notify-header">
          Notifications
        </div>

        <div id="notificationList"></div>
      </div>
    </div>
  </header>

<section class="auth-section">
  <div class="auth-box">
    <h2>Create Account</h2>

    <!-- ===== TAB SWITCH ===== -->
    <div class="role-tabs">
      <button id="studentTab" class="tab active">Student</button>
      <button id="teacherTab" class="tab">Teacher</button>
    </div>

    <!-- ===== STUDENT FORM ===== -->
    <div id="studentForm">

      <input type="text" id="studentRollNo" placeholder="Roll Number" required>
      <select id="studentDepartment" required>
  <option value="">Select Department</option>
  <option>CSE</option>
  <option>ECE</option>
  <option>AET</option>
  <option>BT</option>
  <option>IT</option>
</select>

<select id="studentSemester" required>
  <option value="">Select Semester</option>
  <option>1</option>
  <option>2</option>
  <option>3</option>
  <option>4</option>
  <option>5</option>
  <option>6</option>
  <option>7</option>
  <option>8</option>
</select>

      <input type="email" id="studentEmail" placeholder="Email" required>

      <input type="password" id="studentPassword" placeholder="Password" required>

      <p id="passwordStrength" style="
        font-size:14px;
        margin-top:4px;
        margin-bottom:10px;
        color:#888;
      "></p>

      <input type="password" id="studentConfirmPassword" placeholder="Confirm Password" required>

    </div>

    <!-- ===== TEACHER FORM ===== -->
    <div id="teacherForm" style="display:none; margin-top:15px;">
      <input type="email" id="teacherEmail" placeholder="Email" required>
      <select id="teacherDepartment" required>
  <option value="">Select Department</option>
  <option>CSE</option>
  <option>ECE</option>
  <option>AET</option>
  <option>BT</option>
  <option>IT</option>
</select>
      <input type="password" id="teacherPassword" placeholder="Password" required>
      <input type="password" id="teacherConfirmPassword" placeholder="Confirm Password" required>

    </div>

    <!-- ===== COMMON OTP ===== -->
    <button onclick="sendOTP()" class="btnlogin" id="sendOtpBtn">
      Send OTP
    </button>

    <input
      type="text"
      id="otpInput"
      placeholder="Enter OTP"
      style="display:none;"
    >

    <div id="formMessage" class="form-message"></div>

    <button id="verifyBtn" onclick="verifyOTP()" class="btnlogin">
      Verify & Sign Up
    </button>

    <p>Already have an account?
      <a href="login.html">Login</a>
    </p>

  </div>
</section>

<script type="module" src="js/auth.js"></script>
<script type="module" src="js/script.js"></script>
</body>
</html>
