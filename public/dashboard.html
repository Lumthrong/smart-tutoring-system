<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/dashboard.css">
</head>

<body data-role="student">

  <div class="sidebar" id="sidebar">

    <!-- USER MINI HEADER -->
    <div class="profile-mini">
      <div class="avatar-circle">
        <img id="miniProfileImg" src="" alt="Avatar">
        <span id="avatarCircle">U</span>
      </div>
      <div class="profile-info">
        <p id="profileName">Guest</p>
        <small id="profileEmail"></small>
      </div>
    </div>

    <a href="index.html">Home</a>

    <!-- PROFILE DROPDOWN -->
    <div class="profile-wrapper">
      <div class="profile-toggle" id="profileToggle">
        Profile ▾
      </div>

      <div class="profile-dropdown" id="profileDropdown">
        <a href="dashboard.html" id="dashboardLink">Dashboard</a>
        <a href="accsettings.html">Profile Settings</a>
        <a href="#" id="logoutLink">Logout</a>
      </div>
    </div>

    <a href="login.html" id="loginLink">Login</a>

  </div>

  <div class="overlay" id="overlay"></div>

  <header>
    <button class="menu-btn" id="menuBtn">☰</button>
    <h1>Your dashboard</h1>

    <div class="notify" id="notifyBell">🔔
      <span id="notifyCount">0</span>
      <div id="notificationPanel" class="notify-panel">
        <div class="notify-header">
          Notifications
        </div>

        <div id="notificationList"></div>

      </div>

    </div>
  </header>

  <section class="dashboard">
    <canvas id="progressChart"></canvas>
    <select id="courseSelect"></select>

    <button onclick="startTest()">Quick Test</button>

    <div class="card">
      <h3>Enrolled Courses</h3>
      <div id="enrolledCourses"></div>
      <div class="chatBox" id="chatBox">

        <div class="chatHeader">
          <span>Course Discussion</span>
          <button class="chatClose" id="chatClose">✕</button>
        </div>

        <div class="chatMessages commentList"></div>

        <div class="chatInput">
          <input class="commentInput" placeholder="write...">
          <button class="sendComment">Send</button>
        </div>

      </div>

    </div>

    <div class="card">
      <h3>Book History</h3>
      <p>Coming soon...</p>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script type="module" src="js/script.js"></script>
  <script type="module" src="js/user.js"></script>
  <script type="module" src="js/auth.js"></script>
  <script type="module" src="js/notification.js"></script>
</body>

</html>
